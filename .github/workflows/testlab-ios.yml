name: Test Lab — iOS Game Loop

on:
  workflow_dispatch:
    inputs:
      source_repo_ref:
        description: "Commit SHA from uniscore-mobile"
        required: true
      committer_name:
        required: false
        default: "CI"
      branch:
        required: false
        default: "test-lab"

env:
  LC_ALL: en_US.UTF-8
  LANG: en_US.UTF-8
  GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}

permissions:
  contents: read
  actions: read

jobs:
  testlab-ios:
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      # --- Clone ---
      - name: Clone uniscore-mobile
        run: |
          git clone https://oauth2:$GITLAB_TOKEN@gitlab.com/unity1185445/uniscore-mobile.git
          cd uniscore-mobile
          git checkout ${{ inputs.source_repo_ref }}

      # --- Node + JS deps (same as ci.yml) ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.21.1"

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: uniscore-mobile/node_modules
          key: IOS-cache-node-modules-${{ hashFiles('uniscore-mobile/package.json') }}

      - name: Install JS dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        working-directory: uniscore-mobile
        run: yarn install --network-concurrency 1

      # --- Ruby + Fastlane (same as ci.yml) ---
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true

      - name: Bundle install
        working-directory: uniscore-mobile
        run: bundle install

      # --- iOS build env (same as ci.yml deploy job) ---
      - name: Setup cocoapods
        uses: maxim-lobanov/setup-cocoapods@v1
        with:
          version: 1.16.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Clean Pods
        working-directory: uniscore-mobile/ios
        run: |
          rm -rf Pods
          rm -rf Podfile.lock
          pod cache clean --all

      - name: Pod install
        working-directory: uniscore-mobile/ios
        run: pod install

      - name: Install certificates & provisioning profiles
        working-directory: uniscore-mobile
        run: bash .github/scripts/install_cert_and_provision.sh

      - name: Link Node
        run: ln -s $(command -v node) /usr/local/bin/node || true

      # --- gcloud + Test Lab ---
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build IPA & Run Firebase Test Lab
        working-directory: uniscore-mobile
        run: ./scripts/run-testlab-ios.sh uniscoreStag ReleaseStag
        env:
          GCLOUD_SERVICE_KEY: ${{ secrets.GCLOUD_SERVICE_KEY }}
          GCLOUD_PROJECT_ID: ${{ secrets.GCLOUD_PROJECT_ID }}

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testlab-ios-logs
          path: uniscore-mobile/build/testlab/*.log
          retention-days: 3
